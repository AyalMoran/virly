

services:
  postgres:
    # pgvector image (superset of postgres:16) so the knowledge-base contract
    # test can CREATE EXTENSION vector. The app contract suites are unaffected.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: virly
      POSTGRES_PASSWORD: virly
      POSTGRES_USER: virly
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U virly"]
      interval: 3s
      timeout: 3s
      retries: 10
  mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports: ["27018:27017"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "try { rs.status() } catch (e) { rs.initiate() }"]
      interval: 5s
      timeout: 5s
      retries: 12
